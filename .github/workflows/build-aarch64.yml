name: Build JRE 25 AArch64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Boot JDK (JDK 24/25)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24' # Menggunakan JDK 24 sebagai Boot JDK untuk build JRE 25

      - name: Install AArch64 Cross-Compilation Toolchain & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            autoconf \
            build-essential \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxt-dev \
            libcups2-dev libfontconfig1-dev libasound2-dev

      - name: Configure Build for AArch64
        run: |
          bash configure \
            --openjdk-target=aarch64-linux-gnu \
            --with-boot-jdk=$JAVA_HOME \
            --enable-headless-only \
            --with-debug-level=release

      - name: Compile JRE 25
        run: |
          make images

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-25-aarch64
          path: build/*/images/j2sdk-image/
