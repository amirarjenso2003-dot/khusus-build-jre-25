name: Build JRE 25 (AArch64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04-arm # Memakai runner ARM64 native dari GitHub

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bootstrap JDK (Java 24)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libfontconfig1-dev \
            libfreetype6-dev libx11-dev libxext-dev libxrender-dev \
            libxrandr-dev libxtst-dev libxt-dev libalsa-sound2-dev libcups2-dev

      # Masukkan baris perintah build / configure / make kamu di bawah ini
