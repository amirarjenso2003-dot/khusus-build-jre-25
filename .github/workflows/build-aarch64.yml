- name: Build OpenJDK 25
      run: |
        export NDK_PATH=$PWD/android-ndk-r28
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export SYSROOT=$TOOLCHAIN/sysroot
        export FREETYPE_DIR=$PWD/freetype-2.10.0/build_android-arm64
        export CUPS_DIR=$PWD/cups-2.2.4
        export BOOT_JDK=$PWD/jdk-24.0.2

        export CFLAGS="-O3 -fPIC -DANDROID -D__ANDROID__=1 -Wno-int-conversion -Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types"
        export CXXFLAGS="-O3 -fPIC -DANDROID -D__ANDROID__=1 -Wno-int-conversion -Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types"
        export LDFLAGS="-L$PWD/dummy_libs"
        
        mkdir -p $SYSROOT/usr/include
        ln -s -f /usr/include/X11 $SYSROOT/usr/include/ 2>/dev/null || true
        ln -s -f /usr/include/fontconfig $SYSROOT/usr/include/ 2>/dev/null || true
        ln -s -f $CUPS_DIR/cups $SYSROOT/usr/include/ 2>/dev/null || true
        
        mkdir -p dummy_libs
        ar cru dummy_libs/libpthread.a
        ar cru dummy_libs/librt.a
        ar cru dummy_libs/libthread_db.a
        
        cd openjdk
        
        echo "Configuring OpenJDK 25..."
        bash ./configure \
            --with-boot-jdk=$BOOT_JDK \
            --openjdk-target=aarch64-linux-android \
            --with-toolchain-type=clang \
            --with-tools-dir=$TOOLCHAIN/bin \
            --with-extra-cflags="$CFLAGS" \
            --with-extra-cxxflags="$CXXFLAGS" \
            --with-extra-ldflags="$LDFLAGS" \
            --disable-precompiled-headers \
            --disable-warnings-as-errors \
            --enable-option-checking=fatal \
            --enable-headless-only=yes \
            --with-jvm-variants=server \
            --with-jvm-features=-dtrace,-zero,-vm-structs,-epsilongc \
            --with-cups-include=$CUPS_DIR \
            --with-freetype-include=$FREETYPE_DIR/include/freetype2 \
            --with-freetype-lib=$FREETYPE_DIR/lib \
            --with-fontconfig-include=$SYSROOT/usr/include \
            --with-native-debug-symbols=external \
            --with-debug-level=release \
            --build=x86_64-unknown-linux-gnu \
            CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang \
            CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++ || {
          echo "=== CONFIGURE FAILED ==="
          grep -i "error" config.log | tail -n 40
          exit 1
        }
        
        echo "Building OpenJDK 25..."
        cd build/linux-aarch64-server-release
        make JOBS=4 images || \
        error_code=$?
        if [[ "$error_code" -ne 0 ]]; then
          echo "Build failed, retrying..."
          make JOBS=4 images
        fi
        echo "Build complete!"            --with-extra-cxxflags="$CXXFLAGS" \
            --with-extra-ldflags="$LDFLAGS" \
            --disable-precompiled-headers \
            --disable-warnings-as-errors \
            --enable-option-checking=fatal \
            --enable-headless-only=yes \
            --with-jvm-variants=server \
            --with-jvm-features=-dtrace,-zero,-vm-structs,-epsilongc \
            --with-cups-include=$CUPS_DIR \
            --with-freetype-include=$FREETYPE_DIR/include/freetype2 \
            --with-freetype-lib=$FREETYPE_DIR/lib \
            --with-fontconfig-include=$SYSROOT/usr/include \
            --with-native-debug-symbols=external \
            --with-debug-level=release \
            --build=x86_64-unknown-linux-gnu \
            CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang \
            CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++ || {
          echo "=== CONFIGURE FAILED ==="
          tail -n 150 config.log
          exit 1
        }
        
        echo "Building OpenJDK 25..."
        cd build/linux-aarch64-server-release
        make JOBS=4 images || \
        error_code=$?
        if [[ "$error_code" -ne 0 ]]; then
          echo "Build failed, retrying..."
          make JOBS=4 images
        fi
        echo "Build complete!"

    - name: Strip debug symbols
      run: |
        export NDK_PATH=$PWD/android-ndk-r28
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        echo "Removing debug symbols..."
        BUILD_DIR="openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        
        if [ ! -d "$JRE_DIR" ]; then
          echo "JRE directory not found: $JRE_DIR"
          exit 1
        fi
        
        echo "Stripping binaries..."
        find $JRE_DIR -type f -name "*.so" -exec $STRIP {} \;
        find $JRE_DIR/bin -type f -executable -exec $STRIP {} \; 2>/dev/null || true
        echo "Debug symbols removed"

    - name: Package JRE
      run: |
        echo "Packaging JRE..."
        BUILD_DIR="openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        
        if [ ! -d "$JRE_DIR" ]; then
          echo "JRE directory not found: $JRE_DIR"
          exit 1
        fi
        
        cd $BUILD_DIR
        echo "Creating archive: jre25-aarch64.tar.xz"
        tar --xz -cf ../../../../jre25-aarch64.tar.xz jdk/jre
        cd ../../../../
        
        echo "Archive created successfully"
        ls -lh jre25-aarch64.tar.xz
        echo "Checksum: $(sha256sum jre25-aarch64.tar.xz)"

    - name: Upload JRE artifact
      uses: actions/upload-artifact@v4
      with:
        name: jre25-aarch64
        path: jre25-aarch64.tar.xz
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: jre25-aarch64.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
