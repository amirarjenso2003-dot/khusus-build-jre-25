- name: Download Boot JDK 24
      run: |
        echo "Downloading Boot JDK..."
        wget -nc -nv https://download.java.net/java/early_access/jdk24/29/GPL/openjdk-24-ea+29_linux-x64_bin.tar.gz
        echo "Extracting Boot JDK..."
        tar -xzf openjdk-24-ea+29_linux-x64_bin.tar.gz
        # Sesuaikan nama folder hasil ekstrak jika versinya berubah (misal: jdk-24)
        mv jdk-24* jdk-24.0.2
        echo "Boot JDK ready at: $PWD/jdk-24.0.2"