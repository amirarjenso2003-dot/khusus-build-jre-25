name: Build OpenJDK 25 for Android aarch64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build_aarch64:
    name: "Build JRE 25 for Android aarch64"
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          python3 \
          python-is-python3 \
          unzip \
          zip \
          systemtap-sdt-dev \
          libxtst-dev \
          libasound2-dev \
          libelf-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxrender-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libfreetype6-dev \
          libpng-dev

    - name: Configure devkit paths
      run: |
        cat > set_devkit_path.sh << 'EOF'
        #!/bin/bash
        export TARGET=${TARGET:-aarch64-linux-android}
        export TARGET_JDK=${TARGET_JDK:-aarch64}
        export TARGET_SHORT=${TARGET_SHORT:-arm64}
        export NDK_PREBUILT_ARCH=${NDK_PREBUILT_ARCH:-aarch64}
        export NDK_VERSION=${NDK_VERSION:-r28}
        export BUILD_FREETYPE_VERSION=${BUILD_FREETYPE_VERSION:-2.10.0}
        export JVM_PLATFORM=linux
        
        export TOOLCHAIN=$PWD/android-ndk-$NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64
        export ANDROID_INCLUDE=$PWD/android-ndk-$NDK_VERSION/sysroot/usr/include
        
        export CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang
        export CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        export OBJCOPY=$TOOLCHAIN/bin/llvm-objcopy
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        
        export PATH=$TOOLCHAIN/bin:$PATH
        
        echo "Target: $TARGET"
        echo "Toolchain: $TOOLCHAIN"
        echo "Android Include: $ANDROID_INCLUDE"
        EOF
        chmod +x set_devkit_path.sh

    - name: Download Android NDK r28
      run: |
        echo "Downloading Android NDK r28..."
        wget -nc -nv -O android-ndk-r28-linux.zip "https://dl.google.com/android/repository/android-ndk-r28-linux.zip"

    - name: Extract NDK
      run: |
        echo "Extracting Android NDK..."
        unzip -q android-ndk-r28-linux.zip
        echo "NDK extracted successfully"

    - name: Download Boot JDK 24
      run: |
        echo "Downloading Boot JDK 24 (Adoptium Temurin 24.0.1+8)..."
        cd /tmp
        wget -nv https://github.com/adoptium/temurin24-binaries/releases/download/jdk-24.0.1%2B8/OpenJDK24U-jdk_x64_linux_hotspot_24.0.1_8.tar.gz
        tar -xzf OpenJDK24U-jdk_x64_linux_hotspot_24.0.1_8.tar.gz
        cd -
        mv /tmp/jdk-24.0.1+8 $PWD/jdk-24
        echo "Boot JDK ready at: $PWD/jdk-24"
        $PWD/jdk-24/bin/java -version

    - name: Download required libraries
      run: |
        echo "Downloading required libraries..."
        echo "Downloading CUPS 2.2.4..."
        wget -nc -nv https://github.com/apple/cups/releases/download/v2.2.4/cups-2.2.4-source.tar.gz
        tar -xzf cups-2.2.4-source.tar.gz
        echo "Downloading Freetype 2.10.0..."
        wget -nc -nv https://download.sourceforge.net/freetype/freetype-2.10.0.tar.gz
        tar -xzf freetype-2.10.0.tar.gz
        echo "Libraries downloaded successfully"

    - name: Build Freetype for Android
      run: |
        . set_devkit_path.sh
        cd freetype-2.10.0
        echo "Building Freetype..."
        export PATH=$TOOLCHAIN/bin:$PATH
        ./configure \
          --host=aarch64-linux-android \
          --prefix=${PWD}/build_android-arm64 \
          --without-zlib \
          --with-png=no \
          --with-harfbuzz=no \
          || error_code=$?
        
        if [[ "$error_code" -ne 0 ]]; then
          echo "Configure error:"
          tail -50 config.log
          exit $error_code
        fi
        
        CFLAGS=-fno-rtti CXXFLAGS=-fno-rtti make -j4
        make install
        cd ..
        echo "Freetype built successfully"

    - name: Clone OpenJDK 25u
      run: |
        echo "Cloning OpenJDK 25u repository..."
        git clone --depth 1 https://github.com/openjdk/jdk25u openjdk
        echo "OpenJDK cloned successfully"

    - name: Build OpenJDK 25
      run: |
        . set_devkit_path.sh
        
        export FREETYPE_DIR=$PWD/freetype-2.10.0/build_android-arm64
        export CUPS_DIR=$PWD/cups-2.2.4
        export CFLAGS+=" -DLE_STANDALONE -O3 -DANDROID -D__ANDROID__=1 -Wno-int-conversion -Wno-error=implicit-function-declaration"
        export CXXFLAGS+=" -DLE_STANDALONE -O3 -DANDROID -D__ANDROID__=1 -Wno-int-conversion -Wno-error=implicit-function-declaration"
        export LDFLAGS+=" -L$PWD/dummy_libs"
        
        mkdir -p $ANDROID_INCLUDE
        ln -s -f /usr/include/X11 $ANDROID_INCLUDE/ 2>/dev/null || true
        ln -s -f /usr/include/fontconfig $ANDROID_INCLUDE/ 2>/dev/null || true
        
        mkdir -p dummy_libs
        ar cru dummy_libs/libpthread.a
        ar cru dummy_libs/librt.a
        ar cru dummy_libs/libthread_db.a
        
        ln -s -f $CUPS_DIR/cups $ANDROID_INCLUDE/
        
        cd openjdk
        
        echo "Configuring OpenJDK 25..."
        bash ./configure \
            --with-boot-jdk=$PWD/../jdk-24 \
            --openjdk-target=aarch64-linux-android \
            --with-toolchain-type=clang \
            --with-extra-cflags="$CFLAGS" \
            --with-extra-cxxflags="$CXXFLAGS" \
            --with-extra-ldflags="$LDFLAGS" \
            --disable-precompiled-headers \
            --disable-warnings-as-errors \
            --enable-option-checking=fatal \
            --enable-headless-only=yes \
            --with-jvm-variants=server \
            --with-jvm-features=-dtrace,-zero,-vm-structs,-epsilongc \
            --with-cups-include=$CUPS_DIR \
            --with-freetype-include=$FREETYPE_DIR/include/freetype2 \
            --with-freetype-lib=$FREETYPE_DIR/lib \
            --with-native-debug-symbols=external \
            --with-debug-level=release \
            --with-fontconfig-include=$ANDROID_INCLUDE \
            --build=x86_64-unknown-linux-gnu || \
        error_code=$?
        
        if [[ "$error_code" -ne 0 ]]; then
          echo "CONFIGURE ERROR, showing last 100 lines of config.log:"
          tail -100 config.log
          exit $error_code
        fi
        
        echo "Building OpenJDK 25..."
        cd build/linux-aarch64-server-release
        make JOBS=4 images || \
        error_code=$?
        if [[ "$error_code" -ne 0 ]]; then
          echo "Build failed, retrying..."
          make JOBS=4 images
        fi
        echo "Build complete!"

    - name: Strip debug symbols
      run: |
        . set_devkit_path.sh
        
        echo "Removing debug symbols..."
        BUILD_DIR="openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        
        if [ ! -d "$JRE_DIR" ]; then
          echo "JRE directory not found: $JRE_DIR"
          exit 1
        fi
        
        echo "Stripping binaries..."
        find $JRE_DIR -type f -name "*.so" -exec $STRIP {} \;
        find $JRE_DIR/bin -type f -executable -exec $STRIP {} \; 2>/dev/null || true
        echo "Debug symbols removed"

    - name: Package JRE
      run: |
        . set_devkit_path.sh
        
        echo "Packaging JRE..."
        BUILD_DIR="openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        
        if [ ! -d "$JRE_DIR" ]; then
          echo "JRE directory not found: $JRE_DIR"
          exit 1
        fi
        
        cd $BUILD_DIR
        echo "Creating archive: jre25-aarch64.tar.xz"
        tar --xz -cf ../../../../jre25-aarch64.tar.xz jdk/jre
        cd ../../../../
        
        echo "Archive created successfully"
        ls -lh jre25-aarch64.tar.xz
        echo "Checksum: $(sha256sum jre25-aarch64.tar.xz)"

    - name: Upload JRE artifact
      uses: actions/upload-artifact@v4
      with:
        name: jre25-aarch64
        path: jre25-aarch64.tar.xz
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: jre25-aarch64.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
