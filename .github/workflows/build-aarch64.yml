name: Build OpenJDK 25 for Android aarch64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build_aarch64:
    name: "Build JRE 25 for Android aarch64"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up build environment with CLANG
      run: |
        echo "Installing build dependencies..."
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          build-essential \
          clang \
          llvm \
          python3 \
          python-is-python3 \
          unzip \
          zip \
          systemtap-sdt-dev \
          libxtst-dev \
          libasound2-dev \
          libelf-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxrender-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libfreetype6-dev \
          libpng-dev
        
        echo "Verifying clang installation..."
        clang --version
        which clang
        echo "Build dependencies installed successfully"

    - name: Download Android NDK r28
      run: |
        echo "Downloading Android NDK r28..."
        if [ -f android-ndk-r28-linux.zip ]; then
          echo "NDK already downloaded"
        else
          wget -q --show-progress https://dl.google.com/android/repository/android-ndk-r28-linux.zip
        fi
        echo "NDK download complete"

    - name: Extract Android NDK r28
      run: |
        echo "Extracting Android NDK r28..."
        unzip -q android-ndk-r28-linux.zip
        echo "NDK extracted successfully"
        ls -d android-ndk-r28

    - name: Download Boot JDK 24
      run: |
        echo "Downloading Boot JDK 24.0.1+9 (Adoptium Temurin)..."
        wget -q --show-progress https://github.com/adoptium/temurin24-binaries/releases/download/jdk-24.0.1%2B9/OpenJDK24U-jdk_x64_linux_hotspot_24.0.1_9.tar.gz
        echo "Extracting Boot JDK..."
        tar -xzf OpenJDK24U-jdk_x64_linux_hotspot_24.0.1_9.tar.gz
        echo "Verifying Boot JDK..."
        jdk-24.0.1+9/bin/java -version
        echo "Boot JDK verified: $(jdk-24.0.1+9/bin/java -version 2>&1 | head -1)"

    - name: Download CUPS library
      run: |
        echo "Downloading CUPS 2.2.4..."
        wget -q --show-progress https://github.com/apple/cups/releases/download/v2.2.4/cups-2.2.4-source.tar.gz
        tar -xzf cups-2.2.4-source.tar.gz
        echo "CUPS ready"

    - name: Download Freetype library
      run: |
        echo "Downloading Freetype 2.10.0..."
        wget -q --show-progress https://download.sourceforge.net/freetype/freetype-2.10.0.tar.gz
        tar -xzf freetype-2.10.0.tar.gz
        echo "Freetype ready"

    - name: Build Freetype for Android aarch64
      run: |
        cd freetype-2.10.0
        echo "Building Freetype for Android aarch64..."
        
        export NDK_PATH=$PWD/../android-ndk-r28
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export PATH=$TOOLCHAIN/bin:$PATH
        export CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang
        export CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++
        
        ./configure \
          --host=aarch64-linux-android \
          --prefix=$PWD/build_android-arm64 \
          --without-zlib \
          --with-png=no \
          --with-harfbuzz=no
        
        CFLAGS="-fno-rtti -O3" CXXFLAGS="-fno-rtti -O3" make -j$(nproc)
        make install
        
        echo "Freetype build complete"

    - name: Clone OpenJDK 25u
      run: |
        echo "Cloning OpenJDK 25u..."
        git clone --depth 1 https://github.com/openjdk/jdk25u openjdk
        echo "OpenJDK 25u ready"

    - name: Build OpenJDK 25 for Android
      run: |
        cd openjdk
        
        export NDK_PATH=$PWD/../android-ndk-r28
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export SYSROOT=$TOOLCHAIN/sysroot
        export FREETYPE_DIR=$PWD/../freetype-2.10.0/build_android-arm64
        export CUPS_DIR=$PWD/../cups-2.2.4
        export BOOT_JDK=$PWD/../jdk-24.0.1+9
        
        # Set BUILD compilers (for host machine - use clang)
        export CC=$(which clang)
        export CXX=$(which clang++)
        export LD=$(which clang)
        
        # Set TARGET compilers (for Android)
        export TARGET_CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang
        export TARGET_CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++
        export TARGET_AR=$TOOLCHAIN/bin/llvm-ar
        export TARGET_STRIP=$TOOLCHAIN/bin/llvm-strip
        export TARGET_OBJCOPY=$TOOLCHAIN/bin/llvm-objcopy
        
        echo "=== Build Configuration ==="
        echo "BOOT_JDK: $BOOT_JDK"
        echo "TOOLCHAIN: $TOOLCHAIN"
        echo "Freetype: $FREETYPE_DIR"
        echo "CUPS: $CUPS_DIR"
        echo "Build CC: $(which clang)"
        echo "Target CC: $TARGET_CC"
        echo "=============================="
        
        # Create dummy libs directory
        mkdir -p build_deps/lib
        ar cru build_deps/lib/libpthread.a
        ar cru build_deps/lib/librt.a
        ar cru build_deps/lib/libthread_db.a
        
        echo "Starting OpenJDK 25 configuration..."
        
        bash ./configure \
          --with-boot-jdk=$BOOT_JDK \
          --openjdk-target=aarch64-linux-android \
          --with-toolchain-type=clang \
          --with-tools-dir=$TOOLCHAIN/bin \
          --with-extra-cflags="-O3 -fPIC" \
          --with-extra-cxxflags="-O3 -fPIC" \
          --with-extra-ldflags="-L$PWD/build_deps/lib" \
          --disable-precompiled-headers \
          --disable-warnings-as-errors \
          --enable-option-checking=fatal \
          --enable-headless-only=yes \
          --with-jvm-variants=server \
          --with-jvm-features=-dtrace,-zero,-vm-structs,-epsilongc \
          --with-cups-include=$CUPS_DIR \
          --with-freetype-include=$FREETYPE_DIR/include/freetype2 \
          --with-freetype-lib=$FREETYPE_DIR/lib \
          --with-fontconfig-include=$SYSROOT/usr/include \
          --with-native-debug-symbols=external \
          --with-debug-level=release \
          --build=x86_64-unknown-linux-gnu
        
        if [ $? -ne 0 ]; then
          echo "=== CONFIGURE FAILED ==="
          echo "Last 300 lines of config.log:"
          tail -300 config.log
          exit 1
        fi
        
        echo "Configuration successful!"
        echo "Starting build..."
        
        cd build/linux-aarch64-server-release
        make JOBS=$(nproc) images 2>&1 | tee build.log
        
        BUILD_RESULT=$?
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          echo "Last 100 lines of build output:"
          tail -100 build.log
          exit $BUILD_RESULT
        fi
        
        echo "OpenJDK 25 build SUCCESSFUL!"

    - name: Verify and Strip JRE
      run: |
        export TOOLCHAIN=$PWD/android-ndk-r28/toolchains/llvm/prebuilt/linux-x86_64
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        BUILD_DIR="$PWD/openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        
        if [ ! -d "$JRE_DIR" ]; then
          echo "ERROR: JRE directory not found at $JRE_DIR"
          echo "Contents of build dir:"
          ls -la $BUILD_DIR/
          exit 1
        fi
        
        echo "JRE directory verified"
        echo "JRE contents:"
        ls -la $JRE_DIR/
        
        echo "Stripping debug symbols..."
        find $JRE_DIR -type f -name "*.so" -exec $STRIP {} \; 2>/dev/null || true
        find $JRE_DIR/bin -type f -executable -exec $STRIP {} \; 2>/dev/null || true
        
        echo "Symbols stripped successfully"

    - name: Package JRE to tar.xz
      run: |
        BUILD_DIR="$PWD/openjdk/build/linux-aarch64-server-release"
        JRE_DIR="$BUILD_DIR/jdk/jre"
        OUTPUT_FILE="$PWD/jre25-aarch64.tar.xz"
        
        echo "Packaging JRE..."
        cd $BUILD_DIR
        tar --xz -cf $OUTPUT_FILE jdk/jre
        cd $PWD
        
        echo "Package created: $OUTPUT_FILE"
        ls -lh $OUTPUT_FILE
        echo "SHA256: $(sha256sum $OUTPUT_FILE)"

    - name: Upload JRE artifact
      uses: actions/upload-artifact@v4
      with:
        name: jre25-aarch64
        path: jre25-aarch64.tar.xz
        retention-days: 30
        if-no-files-found: error

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: jre25-aarch64.tar.xz
        body: "JRE 25 for Android aarch64 built with OpenJDK 25u"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
